name: Docker

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  image:
    name: Build image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build PR smoke image
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          load: true
          tags: peekaboo:ci

      - name: Smoke test PR image
        if: github.event_name == 'pull_request'
        run: |
          docker run --rm peekaboo:ci --help
          docker run --rm --entrypoint python peekaboo:ci examples/generate_synthetic_capture.py --output /tmp/synthetic-demo.pcap
          docker run --rm --entrypoint /bin/sh peekaboo:ci -c "python examples/generate_synthetic_capture.py && peekaboo inspect --config configs/synthetic-demo.yaml"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and publish image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
